    <link rel="stylesheet" href="juegosestilos.css">
</head>

<body>

<!-- Barra de navegación Batman -->
<nav class="bat-nav">
    <a href="index.html" class="bat-nav-brand">INICIO</a>
    <ul class="bat-nav-menu">
        <li class="bat-nav-item">
            <a href="#" class="bat-nav-link">UNIDAD 1 &#9662;</a>
            <div class="bat-nav-dropdown">
                <a href="mostrar.html">Mostrar Datos</a>
                <a href="meterdatos01.html">Meter Datos</a>
            </div>
        </li>
        <li class="bat-nav-item">
            <a href="#" class="bat-nav-link">UNIDAD 2 &#9662;</a>
            <div class="bat-nav-dropdown">
                <a href="relaciones01.html">PERSONAJES DE MARVEL</a>
                <a href="juegos_registro.html">Juegos</a>
                <a href="tarjetas.html">Tarjetas de Juegos</a>
            </div>
        </li>
        <li class="bat-nav-item">
            <a href="#" class="bat-nav-link">UNIDAD 3 &#9662;</a>
            <div class="bat-nav-dropdown">
                <a href="pokedex.html">POKEDEX</a>
                <a href="peliculas.html">GALERIA DE PELICULAS</a>
                <a href="juegos.html">GALERIA DE JUEGOS</a>
            </div>
        </li>
    </ul>
</nav>

<div class="page-wrap">
    <div id="alert-container"></div>

    <div class="page-title">&#9670; Expediente Nuevo &#9670;</div>

    <div class="form-wrap">
        <form id="registroForm">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Nombre Real:</label>
                    <input type="text" id="nombrereal" required>
                </div>
                
                <div class="form-group full">
                    <label>Alias (Personaje):</label>
                    <input type="text" id="personaje" required>
                </div>

                <div class="form-group">
                    <label>Altura (cm/m):</label>
                    <input type="text" id="altura" required>
                </div>
                
                <div class="form-group">
                    <label>Peso (kg):</label>
                    <input type="text" id="peso" required>
                </div>

                <div class="form-group full">
                    <label>Superpoderes:</label>
                    <input type="text" id="poderes" required>
                </div>

                <div class="form-group full">
                    <label>Debilidad:</label>
                    <input type="text" id="debilidad" required>
                </div>

                <div class="form-group">
                    <label>Sexo:</label>
                    <input type="text" id="sexo" required>
                </div>

                <div class="form-group">
                    <label>Fecha de Creación:</label>
                    <input type="date" id="creacion" required>
                </div>

                <div class="form-group full">
                    <label>Biografía:</label>
                    <textarea id="biografia" required></textarea>
                </div>
            </div>

            <input type="submit" value="Guardar Personaje">
        </form>
    </div>
</div>

<!-- jQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>

<script>
    // Bat-nav logic
    $(document).ready(function() {
        $('.bat-nav-link').on('click', function(e) {
            var $dropdown = $(this).siblings('.bat-nav-dropdown');
            if ($dropdown.length) {
                e.preventDefault();
                $('.bat-nav-dropdown').not($dropdown).slideUp(300).removeClass('active');
                $('.bat-nav-item').not($(this).parent()).removeClass('active');
                
                $dropdown.slideToggle(300).toggleClass('active');
                $(this).parent().toggleClass('active');
            }
        });
    });

    // Form logic with LocalStorage
    document.getElementById('registroForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Obtener datos existentes o array vacío
        let db = JSON.parse(localStorage.getItem('personajes_db')) || [];

        // Generar un ID "falso" para local storage
        let newId = "LC" + (db.length + 1);

        // Crear objeto del personaje
        const nuevoPersonaje = {
            ID: newId,
            "Nombre real": document.getElementById('nombrereal').value,
            Personaje: document.getElementById('personaje').value,
            Altura: document.getElementById('altura').value,
            Peso: document.getElementById('peso').value,
            Poderes: document.getElementById('poderes').value,
            Sexo: document.getElementById('sexo').value,
            Debilidad: document.getElementById('debilidad').value,
            Creation: document.getElementById('creacion').value,
            Biografia: document.getElementById('biografia').value,
            imagen: ""
        };

        // Guardar
        db.push(nuevoPersonaje);
        localStorage.setItem('personajes_db', JSON.stringify(db));

        // Mostrar éxito
        document.getElementById('alert-container').innerHTML = "<div class='alert-success'>¡Nuevo personaje creado en la Batcomputadora (Local) con éxito!</div>";
        
        // Limpiar form
        this.reset();
    });
</script>
</body>
</html>
