    <div class="container" style="margin-top: 100px;">
        <div id="alert-container"></div>
        <h1 style="margin-bottom: 30px;">Registro de Videojuegos</h1>
        <form id="juegosForm">
            <div class="form-group">
                <label for="compania">Compañía:</label>
                <input type="text" class="form-control" id="compania" name="compania" required>
            </div>
            <div class="form-group">
                <label for="genero">Género:</label>
                <input type="text" class="form-control" id="genero" name="genero" required>
            </div>
            <div class="form-group">
                <label for="juegos">Juego:</label>
                <input type="text" class="form-control" id="juegos" name="juegos" required>
            </div>
            <div class="form-group">
                <label for="juego_genero">Juego Género:</label>
                <input type="text" class="form-control" id="juego_genero" name="juego_genero" required>
            </div>
            <div class="form-group">
                <label for="personajes">Personajes:</label>
                <input type="text" class="form-control" id="personajes" name="personajes" required>
            </div>
            <br>
            <button type="submit" name="submit" class="btn btn-primary">Enviar Datos</button>
        </form>

    <!-- SECCIÓN ADAPTADA DEL CÓDIGO DE LA IMAGEN -->

        <img src="fortnite_small.jpg" alt="GameImg" id="gameImg" width="250px" style="position: absolute; left: 500px; top: 50px;">

        <div id="gameName" class="pokeimg1" style="position: absolute; left: 100px; top: 200px; font-size: 15px; color: #fff; font-weight: bold;"></div>

        <div id="gamemove2" class="pokeimg1" style="position: absolute; left: 100px; top: 340px; font-size: 15px; color: #fff; font-weight: bold;"></div>
        <div id="gamemove3" class="pokeimg1" style="position: absolute; left: 100px; top: 360px; font-size: 15px; color: #fff; font-weight: bold;"></div>
        <div id="gamemove4" class="pokeimg1" style="position: absolute; left: 100px; top: 380px; font-size: 15px; color: #fff; font-weight: bold;"></div>
    </div>

<script>
    // Bat-nav logic
    $(document).ready(function() {
        $('.bat-nav-link').on('click', function(e) {
            var $dropdown = $(this).siblings('.bat-nav-dropdown');
            if ($dropdown.length) {
                e.preventDefault();
                $('.bat-nav-dropdown').not($dropdown).slideUp(300).removeClass('active');
                $('.bat-nav-item').not($(this).parent()).removeClass('active');
                
                $dropdown.slideToggle(300).toggleClass('active');
                $(this).parent().toggleClass('active');
            }
        });
    });

    // Form logic
    document.getElementById('juegosForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Obtener datos existentes
        let db = JSON.parse(localStorage.getItem('juegos_db')) || [];

        // Generar ID
        let newId = db.length + 10;

        // Crear objeto
        const nuevoJuego = {
            id: newId,
            juegos: document.getElementById('juegos').value,
            compania: document.getElementById('compania').value,
            genero: document.getElementById('genero').value,
            personajes: document.getElementById('personajes').value,
            imagen: "" // Base64 de imagen omitida para simplicidad estática
        };

        // Guardar
        db.push(nuevoJuego);
        localStorage.setItem('juegos_db', JSON.stringify(db));

        document.getElementById('alert-container').innerHTML = "<div class='alert alert-success'>¡Juego guardado localmente con éxito!</div>";
        this.reset();
    });
</script>
