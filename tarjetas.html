<div class="container" style="margin-top: 100px;">
    <div class="jumbotron text-center" style="background: transparent; border: none; box-shadow: none;">
        <h1 style="color: #F2C94C; text-shadow: 0 0 10px rgba(242, 201, 76, 0.5); margin-bottom: 30px;">Archivo Videojuegos</h1>
        <a href="juegos_registro.html" class="btn btn-primary btn-lg" style="background: #F2C94C; border-color: #F2C94C; color: #000; font-family: 'Oswald', sans-serif; font-weight: 700;">Nuevo juego</a>
    </div>
</div>

<div class="container" style="margin-bottom: 50px;">
    <div class="table-responsive">
        <table class="table table-hover" style="background: rgba(0,0,0,0.8); color: #ddd; border-radius: 12px; overflow: hidden; border-collapse: separate; border-spacing: 0; font-size: 1.1em;">
            <thead style="background: #F2C94C; color: #000; font-family: 'Oswald', sans-serif; font-size: 1.2em;">
                <tr>
                    <th style="text-align: center; padding: 15px;">Portada</th>
                    <th style="padding: 15px;">Título</th>
                    <th style="padding: 15px;">Compañía</th>
                    <th style="padding: 15px;">Género</th>
                    <th style="padding: 15px;">Personajes</th>
                </tr>
            </thead>
            <tbody id="games-table-body">
                <!-- JS content here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Bat-nav logic
    $(document).ready(function() {
        $('.bat-nav-link').on('click', function(e) {
            var $dropdown = $(this).siblings('.bat-nav-dropdown');
            if ($dropdown.length) {
                e.preventDefault();
                $('.bat-nav-dropdown').not($dropdown).slideUp(300).removeClass('active');
                $('.bat-nav-item').not($(this).parent()).removeClass('active');
                
                $dropdown.slideToggle(300).toggleClass('active');
                $(this).parent().toggleClass('active');
            }
        });
    });

    // Fetch and display data
    document.addEventListener("DOMContentLoaded", function() {
        // Datos locales de localStorage
        let localData = JSON.parse(localStorage.getItem('juegos_db')) || [];

        fetch('data/tarjetas_juegos.json')
            .then(response => response.json())
            .then(jsonData => {
                let allData = [...jsonData, ...localData];
                renderTable(allData);
            })
            .catch(err => {
                console.error("Error loading JSON:", err);
                renderTable(localData);
            });
    });

    function renderTable(data) {
        const tbody = document.getElementById('games-table-body');
        if (data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align: center; padding: 30px; font-size: 1.2em;'>No hay juegos registrados aún.</td></tr>";
            return;
        }

        let html = "";
        data.forEach(row => {
            html += "<tr>";
            html += `<td style="text-align: center; vertical-align: middle; padding: 15px;">`;
            if (row.imagen) {
                html += `<img src="${row.imagen}" alt="Portada" style="width: 140px; border-radius: 8px; border: 2px solid #F2C94C; box-shadow: 0 4px 10px rgba(0,0,0,0.8);" />`;
            } else {
                html += `<span style="color: #F2C9AC;">Sin foto</span>`;
            }
            html += `</td>`;
            html += `<td style="vertical-align: middle; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.3em; color: #fff; padding: 15px;">${row.juegos || 'Sin Título'}</td>`;
            html += `<td style="vertical-align: middle; padding: 15px;">${row.compania || 'N/A'}</td>`;
            html += `<td style="vertical-align: middle; padding: 15px;">${row.genero || 'N/A'}</td>`;
            html += `<td style="vertical-align: middle; padding: 15px;">${row.personajes || 'N/A'}</td>`;
            html += "</tr>";
        });

        tbody.innerHTML = html;
    }
</script>
</body>
</html>
